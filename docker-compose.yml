services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sab-app
    # tini como PID 1: reparenta zombies y propaga señales correctamente
    # al proceso Node, necesario para que SIGTERM llegue al graceful shutdown.
    init: true
    # Le damos hasta 30s al graceful shutdown antes de SIGKILL forzoso.
    # El shutdown handler del app tiene un failsafe interno de 10s.
    stop_grace_period: 30s
    volumes:
      - db-data:/app/prisma
      - uploads-data:/app/public/assets/img/uploads
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=file:/app/prisma/prod.db
      - SESSION_SECRET=${SESSION_SECRET}
      - MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN}
      - MP_PUBLIC_KEY=${MP_PUBLIC_KEY}
      - MP_WEBHOOK_SECRET=${MP_WEBHOOK_SECRET:-}
      - MP_USER_ID=${MP_USER_ID:-}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-Sindicato Argentino de Boleros}
      - BASE_URL=${BASE_URL:-https://sindicatoargentinodeboleros.com.ar}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASS=${ADMIN_PASS:-}
      - PORT=3000
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 300M
    # /healthz valida que Prisma puede consultar SQLite (SELECT 1). Antes
    # apuntaba a "/" que solo probaba que Node respondía — no detectaba
    # si el pool de Prisma se había roto.
    # Uso -qO- (GET + descartar body) en vez de --spider para forzar GET;
    # --spider hace HEAD y Express no siempre resuelve HEAD sobre rutas GET.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - web

  nginx:
    image: nginx:alpine
    container_name: sab-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 50M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - web

volumes:
  db-data:
  uploads-data:

networks:
  web:
    driver: bridge
