<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — SAB Backoffice</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/backoffice/assets/css/bo.css">
</head>
<body>
  <div class="bo-layout">

    <!-- SIDEBAR -->
    <aside class="bo-sidebar" id="sidebar">
      <div class="bo-sidebar-brand">S.A. <span>BOLEROS</span></div>
      <nav class="bo-nav">
        <a href="/backoffice/dashboard.html" class="bo-nav-link active">
          <i class="bi bi-speedometer2"></i> Dashboard
        </a>
        <a href="/backoffice/home-cms.html" class="bo-nav-link">
          <i class="bi bi-house-gear"></i> Home CMS
        </a>
        <a href="/backoffice/eventos-lista.html" class="bo-nav-link">
          <i class="bi bi-calendar-event"></i> Eventos
        </a>
        <a href="/backoffice/lector-qr.html" class="bo-nav-link">
          <i class="bi bi-qr-code-scan"></i> Lector QR
        </a>
        <div class="bo-nav-divider"></div>
        <a href="#" class="bo-nav-link text-danger" onclick="handleLogout()">
          <i class="bi bi-box-arrow-right"></i> Cerrar sesión
        </a>
      </nav>
    </aside>

    <!-- MAIN -->
    <main class="bo-main">
      <header class="bo-topbar">
        <button class="bo-sidebar-toggle" onclick="toggleSidebar()">
          <i class="bi bi-list fs-4"></i>
        </button>
        <h1 class="bo-page-title">Dashboard</h1>
        <div class="bo-topbar-user" id="topbar-user">—</div>
      </header>

      <div class="bo-content">

        <!-- Stats -->
        <div class="row g-3 mb-4" id="stats-row">
          <div class="col-sm-6 col-xl-3">
            <div class="stat-card">
              <div class="stat-icon text-primary"><i class="bi bi-calendar-event-fill"></i></div>
              <div class="stat-body">
                <div class="stat-value" id="stat-eventos">—</div>
                <div class="stat-label">Eventos totales</div>
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-xl-3">
            <div class="stat-card">
              <div class="stat-icon text-success"><i class="bi bi-bag-check-fill"></i></div>
              <div class="stat-body">
                <div class="stat-value" id="stat-compras">—</div>
                <div class="stat-label">Compras totales</div>
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-xl-3">
            <div class="stat-card">
              <div class="stat-icon text-warning"><i class="bi bi-ticket-perforated-fill"></i></div>
              <div class="stat-body">
                <div class="stat-value" id="stat-entradas">—</div>
                <div class="stat-label">Entradas vendidas</div>
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-xl-3">
            <div class="stat-card">
              <div class="stat-icon" style="color:#e63946"><i class="bi bi-currency-dollar"></i></div>
              <div class="stat-body">
                <div class="stat-value" id="stat-recaudado">—</div>
                <div class="stat-label">Recaudado (aprox.)</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Últimas compras -->
        <div class="bo-card mb-4">
          <div class="bo-card-header">
            <h5 class="bo-card-title">Últimas Compras</h5>
          </div>
          <div class="table-responsive">
            <table class="bo-table" id="tabla-compras">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Comprador</th>
                  <th>Evento</th>
                  <th>Entradas</th>
                  <th>Total</th>
                  <th>Estado</th>
                  <th>Fecha</th>
                </tr>
              </thead>
              <tbody id="compras-body">
                <tr><td colspan="7" class="text-center py-4 text-muted">Cargando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/backoffice/assets/js/bo.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadDashboard();
    });

    async function loadDashboard() {
      try {
        const [eventosRes, comprasRes] = await Promise.all([
          boFetch('/api/admin/eventos'),
          boFetch('/api/admin/compras'),
        ]);

        document.getElementById('stat-eventos').textContent = eventosRes.total || 0;
        document.getElementById('stat-compras').textContent = comprasRes.total || 0;

        let entradas = 0, recaudado = 0;
        (comprasRes.compras || []).forEach((c) => {
          if (c.mpEstado === 'approved') {
            entradas += c.cantidadEntradas;
            recaudado += c.totalPagado;
          }
        });

        document.getElementById('stat-entradas').textContent = entradas;
        document.getElementById('stat-recaudado').textContent = `$ ${recaudado.toLocaleString('es-AR')}`;

        const tbody = document.getElementById('compras-body');
        if (!comprasRes.compras || !comprasRes.compras.length) {
          tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">Sin compras registradas</td></tr>';
          return;
        }

        tbody.innerHTML = comprasRes.compras.slice(0, 10).map((c) => `
          <tr>
            <td>${c.id}</td>
            <td>${c.nombre} ${c.apellido}</td>
            <td>${c.evento?.nombre || '—'}</td>
            <td>${c.cantidadEntradas}</td>
            <td>$ ${c.totalPagado.toLocaleString('es-AR')}</td>
            <td><span class="badge-estado ${c.mpEstado}">${c.mpEstado}</span></td>
            <td>${boFecha(c.createdAt)}</td>
          </tr>`
        ).join('');

      } catch (err) {
        console.error('Dashboard error:', err);
      }
    }

  </script>
</body>
</html>
