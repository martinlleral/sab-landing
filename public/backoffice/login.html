<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAB — Backoffice Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --accent: #e63946;
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #2a2a2a;
    }
    body {
      background: var(--bg);
      color: #f1f1f1;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    .login-logo span { color: var(--accent); }
    .login-logo p {
      color: #666;
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .form-label {
      color: #888;
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .form-control {
      background: #1e1e1e;
      border: 1px solid var(--border);
      color: #f1f1f1;
      border-radius: 6px;
      padding: 12px 14px;
    }
    .form-control:focus {
      background: #1e1e1e;
      border-color: var(--accent);
      color: #f1f1f1;
      box-shadow: 0 0 0 3px rgba(230,57,70,0.15);
    }
    .btn-login {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 14px;
      width: 100%;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .btn-login:hover { background: #c1121f; }
    .btn-login:disabled { background: #444; cursor: not-allowed; }
    #error-msg {
      display: none;
      background: rgba(220,53,69,0.15);
      border: 1px solid rgba(220,53,69,0.3);
      border-radius: 6px;
      padding: 10px 14px;
      color: #ff6b6b;
      font-size: 0.9rem;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <h1 style="font-size:1.3rem; letter-spacing:2px;">SINDICATO ARGENTINO <span>DE BOLEROS</span></h1>
      <p>Backoffice Administrativo</p>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="mb-3">
        <label class="form-label" for="email">Email</label>
        <input type="email" class="form-control" id="email" placeholder="admin@ejemplo.com" required autocomplete="email">
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">Contraseña</label>
        <input type="password" class="form-control" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="btn-login">
        <span class="spinner-border spinner-border-sm me-2" id="spinner" style="display:none;"></span>
        Ingresar
      </button>
      <div id="error-msg"></div>
    </form>
  </div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const spinner = document.getElementById('spinner');
      const errorMsg = document.getElementById('error-msg');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      spinner.style.display = 'inline-block';
      errorMsg.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
          credentials: 'include',
        });
        const data = await res.json();

        if (res.ok) {
          window.location.href = '/backoffice/dashboard.html';
        } else {
          errorMsg.textContent = data.error || 'Error al iniciar sesión';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = 'Error de conexión. Intentá de nuevo.';
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
      }
    }
  </script>
</body>
</html>
