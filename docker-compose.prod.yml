# Override para producción con SSL.
#
# Se usa junto con docker-compose.yml:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Agrega:
#   - Puerto 443 para HTTPS
#   - Mount de app-ssl.conf en vez de app.conf (con redirect HTTP→HTTPS + cert SSL)
#   - Volumen /etc/ssl/cloudflare para los certs (cert.pem + key.pem con permisos 644/600)
#
# Requisito previo antes de `up`: tener los certs de Cloudflare Origin (o Let's Encrypt,
# si se adapta app-ssl.conf para usar los paths correspondientes) en /etc/ssl/cloudflare/.
# Ver docs/adaptacion.md sección SSL para el procedimiento de generación de certs.

services:
  nginx:
    ports:
      - "443:443"
    volumes:
      - ./nginx/app-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro
