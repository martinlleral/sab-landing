# Rate limiting general a nivel nginx (defensa en profundidad).
# Corta ataques de alto volumen antes de que lleguen a Node.
# El rate limiting fino por endpoint lo hace la app con express-rate-limit.
# 30 r/s con burst 60 es holgado para un usuario humano y sus requests
# paralelos (imágenes, API, etc.), pero corta flooders.
limit_req_zone $binary_remote_addr zone=sab_api:10m rate=30r/s;
limit_req_status 429;

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    location /api/ {
        limit_req zone=sab_api burst=60 nodelay;

        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
