# Rate limiting general a nivel nginx (defensa en profundidad).
# Corta ataques de alto volumen antes de que lleguen a Node.
# El rate limiting fino por endpoint lo hace la app con express-rate-limit.
limit_req_zone $binary_remote_addr zone=sab_api:10m rate=30r/s;
limit_req_status 429;

server {
    listen 80;
    server_name sindicatoargentinodeboleros.com.ar www.sindicatoargentinodeboleros.com.ar;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://sindicatoargentinodeboleros.com.ar$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name sindicatoargentinodeboleros.com.ar;

    ssl_certificate     /etc/letsencrypt/live/sindicatoargentinodeboleros.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sindicatoargentinodeboleros.com.ar/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    client_max_body_size 10M;

    location /api/ {
        limit_req zone=sab_api burst=60 nodelay;

        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 443 ssl http2;
    server_name www.sindicatoargentinodeboleros.com.ar;

    ssl_certificate     /etc/letsencrypt/live/sindicatoargentinodeboleros.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sindicatoargentinodeboleros.com.ar/privkey.pem;

    return 301 https://sindicatoargentinodeboleros.com.ar$request_uri;
}
